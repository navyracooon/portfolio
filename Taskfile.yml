version: "3"

tasks:
  dev:
    desc: フロントエンドとバックエンドをローカルで並列起動
    deps:
      - dev:backend
      - dev:frontend

  dev:frontend:
    desc: Next.js 開発サーバを起動
    dir: frontend
    env:
      API_INTERNAL_BASE_URL: http://127.0.0.1:8000
      NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:8000
    cmds:
      - npm run dev

  dev:backend:
    desc: FastAPI 開発サーバを起動
    dir: backend
    cmds:
      - uv sync
      - uv run uvicorn app.main:app --host 127.0.0.1 --port 8000 --reload

  docker:dev:
    desc: Docker Compose で開発環境を起動
    cmds:
      - docker compose up --build

  docker:dev:detached:
    desc: Docker Compose で開発環境をバックグラウンド起動
    cmds:
      - docker compose up --build -d

  docker:down:
    desc: Docker Compose の開発環境を停止
    cmds:
      - docker compose down

  docker:logs:
    desc: Docker Compose のログを表示
    cmds:
      - docker compose logs -f

  docker:build:
    desc: Docker イメージをビルド
    cmds:
      - docker compose build

  lint:
    desc: フロントエンドとバックエンドの lint を実行
    cmds:
      - task: lint:frontend
      - task: lint:backend

  lint:frontend:
    desc: ESLint と Prettier check を実行
    dir: frontend
    cmds:
      - npm run lint
      - npm run format:check

  lint:backend:
    desc: Ruff check と format check を実行
    dir: backend
    cmds:
      - uv run ruff check .
      - uv run ruff format --check .

  test:
    desc: フロントエンドとバックエンドの smoke test を実行
    cmds:
      - task: test:backend
      - task: test:frontend

  test:backend:
    desc: FastAPI endpoint test を実行
    dir: backend
    cmds:
      - uv run python -m unittest discover -s tests

  test:frontend:
    desc: Next.js 主要ページの smoke test を実行
    dir: frontend
    env:
      API_INTERNAL_BASE_URL: http://127.0.0.1:8000
      NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:8000
      NEXT_TELEMETRY_DISABLED: "1"
    cmds:
      - npm test

  format:
    desc: フロントエンドとバックエンドを format
    cmds:
      - task: format:frontend
      - task: format:backend

  format:frontend:
    desc: Prettier を実行
    dir: frontend
    cmds:
      - npm run format

  format:backend:
    desc: Ruff format と import fix を実行
    dir: backend
    cmds:
      - uv run ruff check --fix .
      - uv run ruff format .
