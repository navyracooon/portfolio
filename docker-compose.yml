services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    working_dir: /app
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend-venv:/app/.venv
      - backend-data:/data
    environment:
      PYTHONUNBUFFERED: "1"
      UV_LINK_MODE: copy
      PORTFOLIO_DB_PATH: /data/portfolio.sqlite3
      PORTFOLIO_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    working_dir: /app
    command: npm run dev:docker
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - frontend-node_modules:/app/node_modules
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      WATCHPACK_POLLING: "true"

volumes:
  backend-data:
  backend-venv:
  frontend-node_modules:
